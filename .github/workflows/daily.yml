name: gerar jornal diário

on:
  schedule:
    # 7h00 horário de Brasília = 10h00 UTC
    - cron: '0 10 * * *'
  # permite rodar manualmente pela interface do GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: clonar repositório
        uses: actions/checkout@v4

      - name: configurar python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: instalar dependências
        run: pip install -r requirements.txt

      - name: gerar jornal
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python generate.py

      - name: publicar index.html
        run: |
          git config user.name  "jornal-bot"
          git config user.email "jornal-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "jornal: $(date +'%d/%m/%Y')"
          git push
